            { n: 94, l: "VC", w: "VACA", s: "Una VACA volando en el avion del baron rojo disparando corazones y gafas de aviador.", p: "3D isometric memory card style, a VACA cow flying the Red Baron's plane shooting hearts, aviation humor, 8k." },
            { n: 95, l: "VL", w: "VELA", s: "Una VELA que quema oscuridad y emite sombras brillantes.", p: "3D isometric memory card style, a VELA candle burning darkness and emitting glowing shadows, mystical light, 8k." },
            { n: 96, l: "VS", w: "VASO", s: "Un VASO de cristal que bebe arena del mar.", p: "3D isometric memory card style, a crystal VASO drinking sand from the sea, thirsty glass, 8k." },
            { n: 97, l: "VF", w: "PUFO", s: "Fajos de billetes (PUFO) que se vuelven cucarachas al tocarlos.", p: "3D isometric memory card style, bundles of money (PUFO) turning into cockroaches when touched, scam theme, 8k." },
            { n: 98, l: "BCH", w: "BACHE", s: "Un BACHE en la carretera portal a otra galaxia lejana.", p: "3D isometric memory card style, a road BACHE that is a portal to a distant galaxy, urban sci-fi, 8k." },
            { n: 99, l: "PP", w: "PAPA", s: "El PAPA bailando breakdance en el Vaticano con túnica arcoíris.", p: "3D isometric memory card style, the PAPA dancing breakdance in the Vatican with rainbow robes, joyful spirit, 8k." }
        ];

        const App = () => {
            const [view, setView] = useState('gallery');
            const [activeBlock, setActiveBlock] = useState(0);
            const [images, setImages] = useState({});
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(false);
            const [status, setStatus] = useState("");
            const [isMaster, setIsMaster] = useState(false);
            const [testIdx, setTestIdx] = useState(0);
            const [flipped, setFlipped] = useState(false);
            const [manualLink, setManualLink] = useState({});

            useEffect(() => {
                if (!window.fb) return;
                const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                signInAnonymously(auth).catch(() => setStatus("❌ Error Auth"));
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, appId, collection, onSnapshot } = window.fb;
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'mnemonic_images');
                const unsubscribe = onSnapshot(colRef, (snap) => {
                    const data = {};
                    snap.forEach(doc => data[doc.id] = doc.data().url);
                    setImages(data);
                });
                return () => unsubscribe();
            }, [user]);

            const copyPrompt = (promptText) => {
                const el = document.createElement('textarea');
                el.value = promptText;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setStatus(`📋 Prompt en Inglés copiado para tu IA`);
                setTimeout(() => setStatus(""), 2000);
            };

            const saveUrl = async (n, url) => {
                if (!url || !user) return;
                setLoading(true);
                try {
                    const { db, appId, doc, setDoc } = window.fb;
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'mnemonic_images', n.toString()), {
                        url: url, timestamp: Date.now()
                    });
                    setStatus(`✅ Imagen guardada en el #${n}`);
                    setManualLink(prev => ({...prev, [n]: ""}));
                } catch (e) {
                    setStatus("❌ Error al guardar link");
                } finally {
                    setLoading(false);
                    setTimeout(() => setStatus(""), 3000);
                }
            };

            const LucideIcon = ({ name, className }) => (
                <span className={className} dangerouslySetInnerHTML={{ __html: `<i data-lucide="${name}"></i>` }} />
            );

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view, activeBlock, isMaster]);

            const blocks = ["0-9", "10-19", "20-29", "30-39", "40-49", "50-59", "60-69", "70-79", "80-89", "90-99"];

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-2xl">
                        <div className="flex items-center gap-4">
                            <button 
                                onClick={() => setIsMaster(!isMaster)}
                                title="Modo Maestro"
                                className={`p-3 rounded-2xl transition-all ${isMaster ? 'bg-indigo-600 shadow-[0_0_15px_rgba(79,70,229,0.5)]' : 'bg-slate-800'}`}
                            >
                                <LucideIcon name="brain-circuit" className="w-6 h-6 text-white" />
                            </button>
                            <div>
                                <h1 className="text-xl font-black uppercase tracking-tighter text-white">Bohemio Academy</h1>
                                <p className="text-[9px] font-bold text-indigo-400 tracking-[0.3em] uppercase">Investigación Kenny - Mnemotecnia</p>
                            </div>
                        </div>
                        <nav className="flex gap-2 bg-slate-900 p-1 rounded-xl">
                            <button onClick={() => setView('gallery')} className={`px-4 py-2 rounded-lg text-[10px] font-black transition-all ${view === 'gallery' ? 'bg-indigo-600 text-white' : 'text-slate-500'}`}>BIBLIOTECA</button>
                            <button onClick={() => { setView('test'); setFlipped(false); setTestIdx(Math.floor(Math.random()*DATABASE.length)); }} className={`px-4 py-2 rounded-lg text-[10px] font-black transition-all ${view === 'test' ? 'bg-indigo-600 text-white' : 'text-slate-500'}`}>ENTRENAR</button>
                        </nav>
                    </header>

                    {status && (
                        <div className="bg-indigo-600 text-white text-[10px] font-black text-center py-2 uppercase tracking-widest animate-pulse">
                            {status}
                        </div>
                    )}

                    <main className="flex-grow max-w-6xl mx-auto w-full p-6">
                        {view === 'gallery' ? (
                            <div className="space-y-8">
                                <div className="flex gap-2 overflow-x-auto pb-4 hide-scrollbar snap-x">
                                    {blocks.map((b, i) => (
                                        <button key={i} onClick={() => setActiveBlock(i)} className={`flex-shrink-0 px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest border transition-all ${activeBlock === i ? 'bg-indigo-600 border-indigo-500 text-white shadow-lg' : 'bg-slate-800 border-slate-700 text-slate-500'}`}>{b}</button>
                                    ))}
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {DATABASE.slice(activeBlock * 10, (activeBlock + 1) * 10).map(item => (
                                        <div key={item.n} className={`bg-slate-800/40 rounded-[2.5rem] p-6 border border-white/5 flex gap-6 group transition-all ${isMaster ? 'master-active' : ''}`}>
                                            <div className="w-40 h-40 bg-slate-900 rounded-[2rem] flex-shrink-0 relative overflow-hidden flex items-center justify-center border border-white/5 shadow-inner">
                                                {images[item.n] ? 
                                                    <img src={images[item.n]} className="w-full h-full object-cover" alt={item.w} /> : 
                                                    <span className="text-5xl font-black text-slate-800">{item.n}</span>
                                                }
                                                {isMaster && (
                                                    <div className="absolute inset-0 bg-slate-900/95 backdrop-blur-sm p-4 flex flex-col gap-2 opacity-0 group-hover:opacity-100 transition-opacity justify-center text-center">
                                                        <button onClick={() => copyPrompt(item.p)} className="text-[8px] font-black uppercase bg-indigo-600 py-2 rounded-lg text-white">1. Copiar Prompt Inglés</button>
                                                        <input 
                                                            type="text" 
                                                            placeholder="Link Coppermine..." 
                                                            className="bg-black text-[9px] p-2 rounded-lg text-indigo-300 outline-none border border-indigo-500/30"
                                                            value={manualLink[item.n] || ""}
                                                            onChange={(e) => setManualLink({...manualLink, [item.n]: e.target.value})}
                                                        />
                                                        <button onClick={() => saveUrl(item.n, manualLink[item.n])} className="text-[8px] font-black uppercase bg-emerald-600 py-2 rounded-lg text-white">2. Guardar Link</button>
                                                    </div>
                                                )}
                                                {loading && <div className="absolute inset-0 bg-black/60 flex items-center justify-center"><div className="w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div></div>}
                                            </div>
                                            <div className="flex flex-col justify-center flex-grow">
                                                <div className="flex justify-between items-baseline">
                                                    <h3 className="text-5xl font-black text-white leading-none tracking-tighter">{item.n}</h3>
                                                    <span className="text-[10px] font-black text-indigo-400 bg-indigo-400/10 px-3 py-1 rounded-full uppercase">{item.l}</span>
                                                </div>
                                                <p className="text-xl font-black uppercase text-indigo-500 mb-2">{item.w}</p>
                                                <p className="text-[11px] font-medium text-slate-400 italic leading-snug">"{item.s}"</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="max-w-xs mx-auto py-10">
                                <div className="w-full aspect-[3/4] perspective-1000">
                                    <div className={`relative w-full h-full card-inner transform-style-3d cursor-pointer ${flipped ? 'rotate-y-180' : ''}`} onClick={() => setFlipped(true)}>
                                        <div className="absolute inset-0 bg-indigo-600 rounded-[3rem] shadow-2xl flex flex-col items-center justify-center backface-hidden border-[12px] border-indigo-500/30 text-white p-10">
                                            <span className="text-[10rem] font-black leading-none">{DATABASE[testIdx]?.n}</span>
                                            <p className="mt-4 text-[10px] font-black uppercase tracking-widest opacity-50">Toca para revelar</p>
                                        </div>
                                        <div className="absolute inset-0 bg-white rounded-[3rem] shadow-2xl flex flex-col items-center justify-center rotate-y-180 backface-hidden p-8 text-center">
                                            <div className="w-full aspect-square bg-slate-100 rounded-2xl mb-6 overflow-hidden flex items-center justify-center">
                                                {images[testIdx] ? <img src={images[testIdx]} className="w-full h-full object-cover" alt="test" /> : <LucideIcon name="image" className="w-16 h-16 opacity-10" />}
                                            </div>
                                            <h2 className="text-4xl font-black uppercase text-slate-900 tracking-tighter mb-2">{DATABASE[testIdx]?.w}</h2>
                                            <p className="text-[11px] font-bold text-slate-400 italic">"{DATABASE[testIdx]?.s}"</p>
                                        </div>
                                    </div>
                                </div>
                                {flipped && (
                                    <button 
                                        onClick={() => { setFlipped(false); setTestIdx(Math.floor(Math.random()*DATABASE.length)); }} 
                                        className="w-full mt-8 py-5 bg-white text-indigo-900 font-black rounded-2xl shadow-xl uppercase text-[10px] tracking-widest hover:scale-105 transition-all"
                                    >
                                        Siguiente Número
                                    </button>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="p-8 text-center opacity-20">
                        <p className="text-[9px] font-black uppercase tracking-widest text-white">Kenny Investigador • Almacén en gallery.bohemio.ws</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</body>
</html>

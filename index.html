            const [flipped, setFlipped] = useState(false);

            useEffect(() => {
                const { auth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = window.fb;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) { setStatus("❌ Error de conexión"); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const { db, appId, collection, onSnapshot } = window.fb;
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'mnemonic_images');
                const unsubscribe = onSnapshot(colRef, 
                    (snap) => {
                        const data = {};
                        snap.forEach(doc => data[doc.id] = doc.data().url);
                        setImages(data);
                    },
                    (err) => setStatus("❌ Error de permisos")
                );
                return () => unsubscribe();
            }, [user]);

            const compress = async (base64) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 512; canvas.height = 512;
                        canvas.getContext('2d').drawImage(img, 0, 0, 512, 512);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                });
            };

            const fetchWithRetry = async (prompt, retries = 5, delay = 1000) => {
                for (let i = 0; i < retries; i++) {
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                instances: { prompt: prompt },
                                parameters: { sampleCount: 1 }
                            })
                        });
                        if (res.ok) return await res.json();
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    } catch (e) {
                        if (i === retries - 1) throw e;
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }
                }
            };

            const generateOne = async (item) => {
                if (loading || !user) return;
                setLoading(true);
                setStatus(`Esculpiendo: ${item.w}...`);
                try {
                    // PROMPT AJUSTADO: FOCO IMAGEN, TEXTO SECUNDARIO/OCULTO
                    const prompt = `A hyper-realistic 3D mnemonic masterpiece. The visual MUST focus on: ${item.s}. The scene must be extremely bizarre, surreal, and memorable. Unreal Engine 5 render style, cinematic lighting, 8k resolution, white studio background. The word "${item.w}" should be integrated discretely into the background or a secondary object in multiple vibrant colors, but MUST NOT be the main focus. FOCUS 100% ON THE SHOCKING IMAGE ACTION. NO LOGOS.`;
                    
                    const result = await fetchWithRetry(prompt);
                    
                    if (result.predictions?.[0]?.bytesBase64Encoded) {
                        const finalBase64 = await compress(`data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`);
                        const { db, appId, doc, setDoc } = window.fb;
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'mnemonic_images', item.n.toString()), {

                        });
                        setStatus(`✅ ¡${item.w} guardado!`);
                    } else {
                        throw new Error("IA sin respuesta");
                    }

                    setStatus(`❌ Error IA: Reintenta.`);

                    setLoading(false);
                    setTimeout(() => setStatus(""), 3000);

                                                <div className="flex justify-between items-start mb-4 text-white">
                                                    <div>
                                                        <h3 className="text-6xl font-black uppercase text-indigo-400 leading-none mb-1 tracking-tighter">{item.n}</h3>
                                                        <p className="text-2xl font-black text-white uppercase tracking-tighter">{item.w}</p>
                                                    </div>
                                                    <span className="bg-slate-900 text-indigo-300 px-4 py-2 rounded-full text-[11px] font-black border border-indigo-500/20 uppercase tracking-widest">{item.l}</span>
                                                </div>
                                                <div className="bg-slate-900/50 p-5 rounded-[1.5rem] border border-white/5">
                                                    <p className="text-[13px] font-bold text-slate-400 italic leading-relaxed">"{item.s}"</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="max-w-md mx-auto py-12 animate-in zoom-in-95">
                                <div className="w-full aspect-[3/4] perspective-1000">
                                    <div className={`relative w-full h-full card-inner transform-style-3d cursor-pointer ${flipped ? 'rotate-y-180' : ''}`} onClick={() => setFlipped(true)}>
                                        <div className="absolute inset-0 bg-indigo-600 rounded-[4rem] shadow-2xl flex flex-col items-center justify-center backface-hidden border-[18px] border-indigo-500/30 text-white p-10 text-center">
                                            <span className="text-[15rem] font-black leading-none drop-shadow-2xl">{DATABASE[testIdx].n}</span>
                                            <div className="mt-10 opacity-50 flex items-center gap-2 justify-center">
                                                <i data-lucide="zap" className="w-6 h-6 animate-bounce"></i>
                                                <span className="text-[10px] font-black uppercase tracking-[0.3em]">Toca para revelar</span>
                                            </div>
                                        </div>
                                        <div className="absolute inset-0 bg-white rounded-[4rem] shadow-2xl flex flex-col items-center justify-center rotate-y-180 backface-hidden p-10 border-4 border-indigo-600 text-slate-900 text-center">
                                            <div className="w-full aspect-square bg-slate-50 rounded-[3rem] mb-8 overflow-hidden border border-slate-100 flex items-center justify-center shadow-inner">
                                                {images[testIdx] ? <img src={images[testIdx]} className="w-full h-full object-cover" /> : <i data-lucide="image" className="w-24 h-24 opacity-10"></i>}
                                            </div>
                                            <h2 className="text-6xl font-black uppercase text-indigo-900 tracking-tighter mb-4 leading-none">{DATABASE[testIdx].w}</h2>
                                            <p className="text-sm font-bold text-slate-500 text-center italic border-t border-slate-100 pt-6 leading-relaxed">"{DATABASE[testIdx].s}"</p>
                                        </div>
                                    </div>
                                </div>
                                {flipped && <button onClick={() => { setFlipped(false); setTestIdx(Math.floor(Math.random()*DATABASE.length)); }} className="w-full mt-10 py-7 bg-white text-indigo-900 font-black rounded-[2.5rem] shadow-2xl uppercase text-[11px] tracking-[0.2em] flex items-center justify-center gap-3 hover:scale-105 transition-all">Siguiente <i data-lucide="arrow-right" className="w-4 h-4"></i></button>}
                            </div>
                        )}
                    </main>

                    <footer className="p-12 text-center border-t border-white/5 mt-auto opacity-30">
                        <p className="text-[10px] font-black uppercase tracking-[0.3em] text-white">Kenny Investigador • bohemio.ws/academy</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setInterval(() => window.lucide?.createIcons(), 500);
    </script>
</body>
</html>

                    try {
                        const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : FIREBASE_CONFIG;

                        const auth = getAuth(app);
                        const db = getFirestore(app);

                        } else {
                            await signInAnonymously(auth);

                                const id = typeof __app_id !== 'undefined' ? __app_id : APP_UID;
                                const colRef = collection(db, 'artifacts', id, 'public', 'data', 'casillero_master');

                                    setImages(data);
                                }, (err) => console.error("Firestore error:", err));

                };
                startFirebase();
            }, []);

            const compress = async (base64) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 600; canvas.height = 600;
                        canvas.getContext('2d').drawImage(img, 0, 0, 600, 600);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                });
            };

                if (loading) return;
                setLoading(true); setStatus(`Esculpiendo ${word}...`);

                    const key = typeof __api_key !== 'undefined' ? __api_key : GOOGLE_IA_KEY;
                    const prompt = `Unreal Engine 5 render, mnemonic masterpiece: ${story}. Concept: "${word}". Vivid lighting, 8k, white studio background. Shocking visual for memory. PNG style.`;

                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ instances: [{ prompt }], parameters: { sampleCount: 1 } })
                    });
                    const result = await res.json();
                    if (result.predictions?.[0]?.bytesBase64Encoded) {
                        const finalBase64 = await compress(`data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`);
                        const { getFirestore, doc, setDoc } = window.fb;
                        const appId = typeof __app_id !== 'undefined' ? __app_id : APP_UID;

                                                {images[item.n] ? <img src={images[item.n]} className="w-full h-full object-cover animate-in zoom-in-95" /> : <span className="text-4xl font-black text-slate-800">{item.n}</span>}

                                            </div>
                                            <h2 className="text-6xl font-black uppercase text-indigo-900 leading-none mb-2">{DATABASE[testIdx].w}</h2>
                                            <p className="text-sm font-bold text-slate-500 text-center italic border-t border-slate-100 pt-4 leading-relaxed">"{DATABASE[testIdx].s}"</p>
                                        </div>
                                    </div>
                                </div>
                                {flipped && <button onClick={() => { setFlipped(false); setTestIdx(Math.floor(Math.random()*100)); }} className="w-full mt-10 py-7 bg-white text-indigo-900 font-black rounded-2xl shadow-xl uppercase text-xs hover:bg-indigo-50 transition-all">Siguiente Casillero</button>}
                            </div>
                        )}
                    </main>

                    {loading && (
                        <div className="fixed bottom-12 left-1/2 -translate-x-1/2 glass px-10 py-6 rounded-full shadow-2xl flex items-center gap-6 z-[300] border-indigo-500/40 text-white">
                            <div className="w-8 h-8 border-4 border-slate-700 border-t-indigo-500 rounded-full animate-spin"></div>
                            <span className="text-[10px] font-black uppercase tracking-[0.2em]">{status}</span>
                        </div>
                    )}

                    <footer className="p-10 text-center border-t border-white/5 mt-auto opacity-30">
                        <p className="text-[10px] font-black uppercase tracking-[0.3em]">Kenny Investigador • bohemio.ws/academy</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setInterval(() => window.lucide?.createIcons(), 500);
    </script>
</body>
</html>
